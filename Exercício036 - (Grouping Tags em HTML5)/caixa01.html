<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 { /*box-level*/
            background-color: cadetblue;
            height: 300px;
            width: 300px; 

            /* height e width é o famoso box-sizing*/

            /* border-width: 10px;
            border-style: solid;
            border-color: darkslategray; */

            border: 10px solid darkslategray;
            
            /* padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px; 
            
            Quando coloco 1 valor no padding usando o shorthand(padding: 10px;) ele automaticamente coloca 10px em todos os lados, sem precisar colocar 4x o mesmo valor, porém se eu colocar 2 valores (padding: 10px 20px;) eu estou me referindo a altura e a largura.
            
            */

            padding: 10px 20px;

            /* margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px; */

            margin: 20px auto 40px auto;

            /* outline-width: 5px;outline-style: dashed;
            outline-color: salmon; */

            outline: 5px dashed salmon;
        }
        a { /*inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            
        }

        /*Posso transformar uma tag block level em inline level e vice versa, utilizando 
        
        'display: block;' ou 'display: inline;'

        Mas caso eu queira deixar uma tag inline level com caractéristicas de box level, utilizo: 

        'display: inline-block;', desta maneira consigo mudar a altura e a largura.
        */
    </style>
    
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">Mas os links são exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
